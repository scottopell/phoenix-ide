# Phoenix IDE — per-conversation tmux server config (loaded via `tmux -f`).
#
# Intentionally minimal: this is a programmatic backend for Phoenix's
# agent + in-app terminal, NOT the user's interactive tmux. User
# preferences from ~/.tmux.conf and ~/.config/tmux/tmux.conf are
# deliberately NOT loaded here — Phoenix's tmux servers run in a clean
# config to avoid interactive-binding interactions (e.g., a user
# binding that calls `send-keys -M` was causing tmux 3.2a to fail
# agent-driven send-keys with "no current client").
#
# Minimum supported tmux version: 3.3 (3.2's send-keys parser emits
# benign "no current client" diagnostics that agents misread as
# failures; 3.3 reworked the parser to not need a client at all).

# Color/terminal — match Phoenix's terminal parser expectations.
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

# Generous scrollback so agent peek/wait/capture-pane can reach back
# into recent history without losing content.
set -g history-limit 100000

# Mouse on — helps when a human attaches via the in-app terminal.
# Has no effect on agent send-keys / capture-pane.
set -g mouse on

# Focus events — neovim/etc. rely on FocusGained/FocusLost.
set -g focus-events on

# Meta-key responsiveness, especially for vim.
set -g escape-time 0

# OSC sequences (clipboard, notifications) reach the outer terminal
# when a human attaches via the in-app terminal.
set -g allow-passthrough on

# Window numbering starts at 1 — common convention.
set -g base-index 1
